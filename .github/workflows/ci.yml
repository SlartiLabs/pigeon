name: ci

# The thesis of this tool is validation; this workflow is what makes every
# "suite green" claim machine-checked rather than a local attestation.
on:
  push:
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]   # pyproject requires-python = ">=3.11"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install ripgrep (retrieval backend)
        run: sudo apt-get update && sudo apt-get install -y ripgrep

      - name: Install package + dev extras
        run: python -m pip install -e ".[dev]"

      - name: Tests
        run: pytest -q

      - name: Type check
        run: pyrefly check

      - name: Handoff schema is valid JSON
        run: python -c "import json; json.load(open('.pigeon/handoff.schema.json'))"

      - name: Smoke — pigeon demo (handoff chain + retrieval; no agents spawned)
        run: pigeon demo
