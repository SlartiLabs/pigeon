# agentctx configuration. Human-edited -> YAML is fine here.
# The cross-model *contract* (handoffs) is strictly JSON; see AGENTS.md.
# Anything omitted falls back to defaults in src/agentctx/config.py.
schema_version: "1.0"  # config-format version — NOT the handoff schema

paths:
  canonical: AGENTS.md
  # explicit (override): this public repo ships pointers for both tools
  # regardless of what any contributor has installed. New repos default to
  # `generated: auto`. See docs/MANUAL.md §5.
  generated: [CLAUDE.md, GEMINI.md]
  manifest: .pigeon/manifest.json
  handoffs_dir: .pigeon/handoffs
  metrics: .pigeon/metrics.jsonl
  handoff_schema: .pigeon/handoff.schema.json

manifest:
  # Globs (relative to repo root) whose public interfaces get indexed.
  include:
    - "src/**/*.py"
    - "*.py"
  exclude:
    - "**/__pycache__/**"
  # Declarative project knowledge that cannot be auto-derived from code.
  # Kept here so the manifest stays deterministic and reviewable.
  decisions:
    json_over_yaml: "Every model's tool-calling is JSON-trained; YAML whitespace is a cross-model failure mode."
    graph_deferred: "Fast-churn repos waste a knowledge graph's LLM ingestion cost; revisit only for a stable core, gated on metrics."
    pointers_not_payloads: "Separate CLIs share no memory; the contract is the filesystem. Handoffs carry pointers, resolved on demand."
  owners:
    agentctx: SlartiLabs

retrieval:
  include:
    - "**/*.py"
    - "**/*.md"
    - "**/*.json"
    - "**/*.toml"
    - "**/*.sh"
  exclude:
    - "**/__pycache__/**"
    - ".git/**"
    - ".venv/**"
    - "venv/**"
    - "**/*.egg-info/**"
    - ".pigeon/metrics.jsonl"
  max_file_bytes: 200000
  chunk_lines: 40
  chunk_overlap: 10
  default_top_k: 5
  # Path to the ripgrep binary. null -> AGENTCTX_RG env, then PATH.
  ripgrep_path: null
  # Vector retrieval is OFF by default (fast-churn repos). When enabled it
  # uses a local embedding model + local store only — never cloud.
  vector:
    enabled: false
    model: "all-MiniLM-L6-v2"
    store_dir: ".pigeon/vector"

resolve:
  # s3:// pointers require this flag AND the optional [s3] extra.
  allow_s3: false

tokens:
  # Used only if the optional [tokens] extra (tiktoken) is installed;
  # otherwise a deterministic offline heuristic is used.
  encoding: "cl100k_base"

# --- multi-model "army" runners ------------------------------------------------
# A runner is just an argv template keyed by an arbitrary name; the binary is
# template[0]. So one (CLI, model) pair = one runner. Free opencode-routed models
# do the heavy generation; Sonnet + agy gate; Opus renders the verdict.
# {prompt} is quoted so YAML doesn't read it as a flow mapping.
#
# FREE GENERATION TIER (all route through the `opencode` binary, three authed
# providers — opencode Zen / openrouter / nvidia; see ~/.local/share/opencode/
# auth.json). The user-selected free model set (2026-06-16):
#   opencode Zen : mimo-v2.5-free, north-mini-code-free, nemotron-3-ultra-free
#   openrouter   : nex-agi/nex-n2-pro:free
#   nvidia       : nemotron-3-nano-30b-a3b, minimax-m2.7, mixtral-8x22b-instruct,
#                  mistral-large-3-675b-instruct-2512
#
# RELIABILITY HARDENING (after a 5.6h stall):
#   * opencode keeps a single shared SQLite DB (~/.local/share/opencode/
#     opencode.db, WAL). Concurrent army instances contend on its lock ->
#     "database is locked" -> the army hangs. FIX: each opencode runner gets its
#     OWN XDG_DATA_HOME (its own opencode.db) under /tmp/pigeon-oc/<runner>/,
#     pre-seeded with auth.json + account.json so auth still works. No lock,
#     full parallelism restored.
#   * EVERY runner is wrapped in `timeout -k 30 <secs>`: a hung child dies on
#     its own (SIGTERM, then SIGKILL 30s later) instead of orphaning for hours.
#     Per-runner timeouts are reliable where the prior outer `timeout pigeon ...`
#     wrapper orphaned its children.
#   * All numeric args are quoted strings: _fill() runs str.replace on every
#     template arg, so a bare int would crash.
#   * All 11 runners are defined explicitly (incl. agy) so the run is correct
#     whether project config merges over or replaces the defaults.
coordinate:
  parallel_limit: 4
  runners:
    # --- OpenCode Zen (free) ---
    oc-mimo:          [timeout, "-k", "30", "600", env, "XDG_DATA_HOME=/tmp/pigeon-oc/oc-mimo", opencode, run, -m, opencode/mimo-v2.5-free, "{prompt}"]
    oc-north:         [timeout, "-k", "30", "600", env, "XDG_DATA_HOME=/tmp/pigeon-oc/oc-north", opencode, run, -m, opencode/north-mini-code-free, "{prompt}"]
    oc-nemotron:      [timeout, "-k", "30", "600", env, "XDG_DATA_HOME=/tmp/pigeon-oc/oc-nemotron", opencode, run, -m, opencode/nemotron-3-ultra-free, "{prompt}"]
    # --- OpenRouter (free) ---
    oc-nex:           [timeout, "-k", "30", "600", env, "XDG_DATA_HOME=/tmp/pigeon-oc/oc-nex", opencode, run, -m, "openrouter/nex-agi/nex-n2-pro:free", "{prompt}"]
    # --- NVIDIA (free tier) ---
    nv-nano:          [timeout, "-k", "30", "600", env, "XDG_DATA_HOME=/tmp/pigeon-oc/nv-nano", opencode, run, -m, nvidia/nvidia/nemotron-3-nano-30b-a3b, "{prompt}"]
    nv-minimax:       [timeout, "-k", "30", "600", env, "XDG_DATA_HOME=/tmp/pigeon-oc/nv-minimax", opencode, run, -m, nvidia/minimaxai/minimax-m2.7, "{prompt}"]
    nv-mixtral:       [timeout, "-k", "30", "600", env, "XDG_DATA_HOME=/tmp/pigeon-oc/nv-mixtral", opencode, run, -m, nvidia/mistralai/mixtral-8x22b-instruct, "{prompt}"]
    nv-mistral-large: [timeout, "-k", "30", "600", env, "XDG_DATA_HOME=/tmp/pigeon-oc/nv-mistral-large", opencode, run, -m, nvidia/mistralai/mistral-large-3-675b-instruct-2512, "{prompt}"]
    # --- gate / authority / review (reliable, telemetry-measured) ---
    sonnet:           [timeout, "-k", "30", "900", claude, -p, "{prompt}", --model, sonnet]
    opus:             [timeout, "-k", "30", "1800", claude, -p, "{prompt}", --model, opus]
    agy:              [timeout, "-k", "30", "900", agy, -p, "{prompt}"]
    # --- OpenAI Codex CLI (metered; logged in via ChatGPT; reads AGENTS.md) ---
    codex:            [timeout, "-k", "30", "900", codex, exec, "{prompt}"]
    # --- Xiaomi MiMo-Code (opencode fork; absolute path — not on the non-login
    #     PATH; works out of the box, no login needed) ---
    mimo:             [timeout, "-k", "30", "900", mimo, run, "{prompt}"]
  skip_permissions_flags:
    oc-mimo: []
    oc-north: []
    oc-nemotron: []
    oc-nex: []
    nv-nano: []
    nv-minimax: []
    nv-mixtral: []
    nv-mistral-large: []
    sonnet: [--dangerously-skip-permissions]
    opus: [--dangerously-skip-permissions]
    agy: [--dangerously-skip-permissions]
    codex: [--dangerously-bypass-approvals-and-sandbox]
    mimo: [--dangerously-skip-permissions]
  # Appended under --telemetry so the child emits a usage report we mine for
  # MEASURED tokens/cost. sonnet/opus wrap `claude`, whose `--output-format
  # json` usage doc is verified — the flag is valid in any template position.
  # Runners with no usable usage flag are listed as [] so they are EXPLICITLY
  # unmeasured (coordinate warns at dispatch instead of silently recording
  # zero). The free opencode-routed runners expose `--format json` + `opencode
  # stats`, but free-model usage reporting is unverified, so they stay [] until
  # confirmed.
  telemetry_flags:
    oc-mimo: []
    oc-north: []
    oc-nemotron: []
    oc-nex: []
    nv-nano: []
    nv-minimax: []
    nv-mixtral: []
    nv-mistral-large: []
    sonnet: [--output-format, json]
    opus: [--output-format, json]
    agy: []
    # codex --json emits a turn.completed {usage:{*_tokens}} event — VERIFIED to
    # parse via the existing _claude_usage parser (tiny live exec, 2026-06-20).
    codex: [--json]
    # mimo --format json is opencode-shaped (tokens:{...}+cost) → _opencode_parser
    # handles it; VERIFIED end-to-end (live mimo run measured 43100 tok, 2026-06-20).
    mimo: [--format, json]
  # ESTIMATE-ONLY pricing for the transcript-recount fallback (untelemetered
  # runners like agy). Results are flagged `estimated: true` and are NOT
  # measurements — the transcript is argv+stdout only (agent-read context is
  # uncounted) and these rates are a stated snapshot, not a bill. VERIFY the rates
  # before citing any derived cost. USD per million tokens; key matches a model
  # substring.
  fallback_pricing:
    snapshot: "2026-07-06 (rates UNVERIFIED — confirm against provider pricing)"
    rates:
      sonnet:         {in: 3.0,  out: 15.0}
      opus:           {in: 15.0, out: 75.0}
      gemini-3.1-pro: {in: 1.25, out: 10.0}
      gemini-3.5-flash: {in: 0.30, out: 2.50}
      agy:            {in: 0.30, out: 2.50}
